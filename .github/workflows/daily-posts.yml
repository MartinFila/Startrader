name: finanzas.pop — 3 posts diarios

on:
  schedule:
    # Optimal times for Mexico audience (research-backed):
    # 11am CST = lunch browsing peak (Reels discovery)
    # 2pm CST = afternoon engagement
    # 7pm CST = evening peak (highest save rate)
    # CST = UTC-6, so: 17:00, 20:00, 01:00 UTC
    - cron: '3 17 * * *'
    - cron: '7 20 * * *'
    - cron: '11 1 * * *'
  workflow_dispatch: # permite correrlo manual desde GitHub

jobs:
  publish-post:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      # Chromium para Remotion
      - run: npx playwright install --with-deps chromium

      - name: Generar y publicar 1 post
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          METRICOOL_API_KEY: ${{ secrets.METRICOOL_API_KEY }}
          METRICOOL_USER_ID: ${{ secrets.METRICOOL_USER_ID }}
          METRICOOL_BLOG_ID: ${{ secrets.METRICOOL_BLOG_ID }}
        run: node engine/run.mjs --count 1
